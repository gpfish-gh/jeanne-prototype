<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jeanné — Evening Reflection</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/styles.css">
  <style type="text/tailwindcss">
    @theme {
      --color-gold-50: #FDF8F0; --color-gold-100: #F9EDDA; --color-gold-200: #F0D9B0; --color-gold-300: #E5C080;
      --color-gold-400: #D4A053; --color-gold-500: #C48B38; --color-gold-600: #A8722B; --color-gold-700: #8A5C22;
      --color-purple-50: #F5F2FC; --color-purple-100: #E8E0F7; --color-purple-200: #D1C0EF; --color-purple-300: #B59FE3;
      --color-purple-400: #9B7FD4; --color-purple-500: #8266C4; --color-purple-600: #6A4FAD; --color-purple-700: #543D8C;
      --color-blue-50: #F0F4FC; --color-blue-100: #DCE6F7; --color-blue-200: #B8CCEF; --color-blue-300: #8DADE3;
      --color-blue-400: #5B8FD4; --color-blue-500: #4175C0; --color-blue-600: #335EA0; --color-blue-700: #284A80;
      --color-bg: #F8F7F4; --color-surface: #FFFFFF; --color-border: #E8E5DF;
      --color-text-primary: #1A1A1A; --color-text-secondary: #6B6B6B; --color-text-muted: #9B9B9B;
      --color-success: #34D399; --color-warning: #FBBF24; --color-danger: #F87171;
    }
    /* Range slider styling */
    input[type="range"].energy-slider {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      width: 100%;
    }
    input[type="range"].energy-slider::-webkit-slider-runnable-track {
      height: 8px;
      background: linear-gradient(90deg, #F87171 0%, #FBBF24 50%, #34D399 100%);
      border-radius: 999px;
    }
    input[type="range"].energy-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 28px;
      height: 28px;
      background: #FFFFFF;
      border: 3px solid #8266C4;
      border-radius: 50%;
      margin-top: -10px;
      box-shadow: 0 2px 8px rgba(130, 102, 196, 0.3);
      cursor: pointer;
    }
    input[type="range"].energy-slider::-moz-range-track {
      height: 8px;
      background: linear-gradient(90deg, #F87171 0%, #FBBF24 50%, #34D399 100%);
      border-radius: 999px;
    }
    input[type="range"].energy-slider::-moz-range-thumb {
      width: 28px;
      height: 28px;
      background: #FFFFFF;
      border: 3px solid #8266C4;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(130, 102, 196, 0.3);
      cursor: pointer;
    }
  </style>
</head>
<body class="bg-bg font-[Inter] antialiased">
  <div class="max-w-[375px] mx-auto min-h-screen bg-bg relative flex flex-col">
    <div class="page-content flex-1 flex flex-col">

      <div class="h-11"></div>

      <!-- Header -->
      <div class="flex items-center justify-between px-5 pb-3">
        <a href="dashboard.html" class="w-10 h-10 flex items-center justify-center -ml-2">
          <i data-lucide="x" class="w-5 h-5 text-text-primary"></i>
        </a>
        <div class="flex items-center gap-2">
          <i data-lucide="moon" class="w-4 h-4 text-purple-500"></i>
          <h1 class="text-base font-bold text-text-primary">Evening Reflection</h1>
        </div>
        <div class="w-10"></div>
      </div>

      <!-- Date band -->
      <p class="px-5 text-[10px] font-bold uppercase tracking-widest text-text-muted mb-3">Monday · 9:00 PM</p>

      <!-- Headline -->
      <div class="px-5 mb-7">
        <h2 class="text-2xl font-extrabold text-text-primary leading-tight">How did today feel?</h2>
        <p class="text-sm text-text-secondary mt-1">Honest is best — even one tap helps.</p>
      </div>

      <!-- Energy slider -->
      <div class="mx-4 mb-6 bg-white rounded-2xl border border-border/50 p-5">
        <div class="flex items-center justify-between mb-3">
          <p class="text-[11px] font-bold uppercase tracking-wider text-text-muted">Energy</p>
          <p class="text-2xl font-extrabold text-purple-500" data-energy-value>7</p>
        </div>
        <input type="range" min="1" max="10" value="7" class="energy-slider" data-energy-slider>
        <div class="flex justify-between mt-2">
          <span class="text-[10px] font-semibold text-text-muted">Drained</span>
          <span class="text-[10px] font-semibold text-text-muted">Energised</span>
        </div>
      </div>

      <!-- Mood chips -->
      <div class="mx-4 mb-6">
        <p class="text-[11px] font-bold uppercase tracking-wider text-text-muted mb-2 px-1">Mood</p>
        <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1">
          <button data-mood-chip class="flex-shrink-0 px-3 py-2 bg-white border border-border/50 rounded-full text-xs font-semibold text-text-primary">
            😌 Calm
          </button>
          <button data-mood-chip class="flex-shrink-0 px-3 py-2 bg-white border border-border/50 rounded-full text-xs font-semibold text-text-primary">
            🔥 Strong
          </button>
          <button data-mood-chip class="flex-shrink-0 px-3 py-2 bg-white border border-border/50 rounded-full text-xs font-semibold text-text-primary">
            😥 Drained
          </button>
          <button data-mood-chip class="flex-shrink-0 px-3 py-2 bg-white border border-border/50 rounded-full text-xs font-semibold text-text-primary">
            ⚡ Wired
          </button>
          <button data-mood-chip class="flex-shrink-0 px-3 py-2 bg-white border border-border/50 rounded-full text-xs font-semibold text-text-primary">
            😊 Happy
          </button>
        </div>
      </div>

      <!-- Note -->
      <div class="mx-4 mb-6">
        <p class="text-[11px] font-bold uppercase tracking-wider text-text-muted mb-2 px-1">Anything else?</p>
        <textarea
          class="w-full bg-white border border-border/50 rounded-xl p-3 text-sm text-text-primary placeholder:text-text-muted focus:outline-none resize-none"
          rows="3"
          placeholder="Optional · A sentence or two..."
        ></textarea>
      </div>

      <!-- Spacer -->
      <div class="flex-1"></div>

      <!-- Save -->
      <div class="px-5 pb-8">
        <a href="dashboard.html" class="btn-press block w-full py-4 bg-gold-400 hover:bg-gold-500 text-white font-bold text-base rounded-xl transition-colors shadow-sm text-center">
          Save reflection
          <i data-lucide="check" class="w-4 h-4 inline-block -mt-0.5 ml-1"></i>
        </a>
        <p class="text-center text-[11px] text-text-muted mt-2">
          Your reflection tunes tomorrow's plan.
        </p>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // Energy slider
    const slider = document.querySelector('[data-energy-slider]');
    const valueEl = document.querySelector('[data-energy-value]');
    if (slider && valueEl) {
      slider.addEventListener('input', () => {
        valueEl.textContent = slider.value;
      });
    }
    // Mood chips — single select
    document.querySelectorAll('[data-mood-chip]').forEach(chip => {
      chip.addEventListener('click', () => {
        const isSelected = chip.classList.contains('selected');
        document.querySelectorAll('[data-mood-chip]').forEach(c => {
          c.classList.remove('selected', 'bg-purple-500', 'text-white', 'border-purple-500');
          c.classList.add('bg-white', 'text-text-primary', 'border-border/50');
        });
        if (!isSelected) {
          chip.classList.add('selected', 'bg-purple-500', 'text-white', 'border-purple-500');
          chip.classList.remove('bg-white', 'text-text-primary', 'border-border/50');
        }
      });
    });
  </script>
</body>
</html>
