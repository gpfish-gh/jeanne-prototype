  <script>
    // ---- Shopping list interactivity ----
    const items = document.querySelectorAll('[data-shop-item]');
    const totalEl = document.querySelector('[data-shop-total]');
    const checkedEl = document.querySelector('[data-shop-checked]');
    const progressEl = document.querySelector('[data-shop-progress]');

    const updateProgress = () => {
      const checked = document.querySelectorAll('[data-shop-item].is-checked').length;
      const total = items.length;
      checkedEl.textContent = checked;
      totalEl.textContent = total;
      progressEl.style.width = total ? (checked / total * 100) + '%' : '0%';
    };

    items.forEach(item => {
      item.addEventListener('click', () => {
        item.classList.toggle('is-checked');
        const isChecked = item.classList.contains('is-checked');
        const check = item.querySelector('[data-shop-check]');
        const icon = item.querySelector('[data-shop-check-icon]');
        const name = item.querySelector('[data-shop-name]');
        if (isChecked) {
          check.classList.remove('border-border', 'bg-white');
          check.classList.add('border-success', 'bg-success');
          icon.classList.remove('hidden');
          name.classList.add('line-through', 'text-text-muted');
        } else {
          check.classList.add('border-border', 'bg-white');
          check.classList.remove('border-success', 'bg-success');
          icon.classList.add('hidden');
          name.classList.remove('line-through', 'text-text-muted');
        }
        updateProgress();
      });
    });

    updateProgress();

    // ---- Category filter ----
    document.querySelectorAll('[data-shop-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.shopFilter;
        document.querySelectorAll('[data-shop-filter]').forEach(b => {
          b.classList.remove('bg-purple-500', 'text-white', 'font-bold');
          b.classList.add('bg-white', 'text-text-muted', 'font-semibold', 'border', 'border-border');
        });
        btn.classList.remove('bg-white', 'text-text-muted', 'font-semibold', 'border', 'border-border');
        btn.classList.add('bg-purple-500', 'text-white', 'font-bold');

        document.querySelectorAll('[data-shop-category]').forEach(cat => {
          cat.classList.toggle('hidden', target !== 'all' && cat.dataset.shopCategory !== target);
        });
      });
    });
  </script>
