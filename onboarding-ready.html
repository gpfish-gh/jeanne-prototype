<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jeanné — You're All Set!</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/styles.css">
  <style type="text/tailwindcss">
    @theme {
      --color-gold-50: #FDF8F0;
      --color-gold-100: #F9EDDA;
      --color-gold-200: #F0D9B0;
      --color-gold-300: #E5C080;
      --color-gold-400: #D4A053;
      --color-gold-500: #C48B38;
      --color-gold-600: #A8722B;
      --color-gold-700: #8A5C22;
      --color-purple-50: #F5F2FC;
      --color-purple-100: #E8E0F7;
      --color-purple-200: #D1C0EF;
      --color-purple-300: #B59FE3;
      --color-purple-400: #9B7FD4;
      --color-purple-500: #8266C4;
      --color-purple-600: #6A4FAD;
      --color-purple-700: #543D8C;
      --color-blue-50: #F0F4FC;
      --color-blue-100: #DCE6F7;
      --color-blue-200: #B8CCEF;
      --color-blue-300: #8DADE3;
      --color-blue-400: #5B8FD4;
      --color-blue-500: #4175C0;
      --color-blue-600: #335EA0;
      --color-blue-700: #284A80;
      --color-bg: #F8F7F4;
      --color-surface: #FFFFFF;
      --color-border: #E8E5DF;
      --color-text-primary: #1A1A1A;
      --color-text-secondary: #6B6B6B;
      --color-text-muted: #9B9B9B;
      --color-success: #34D399;
      --color-warning: #FBBF24;
      --color-danger: #F87171;
    }
  </style>
</head>
<body class="bg-bg font-[Inter] antialiased">
  <div class="max-w-[375px] mx-auto min-h-screen bg-bg relative flex flex-col">
    <div class="page-content flex-1 flex flex-col">

      <!-- Status bar spacer -->
      <div class="h-11"></div>

      <!-- Top bar -->
      <div class="flex items-center justify-between px-5 mb-2">
        <a href="onboarding-devices.html" class="w-10 h-10 flex items-center justify-center -ml-2">
          <i data-lucide="arrow-left" class="w-5 h-5 text-text-primary"></i>
        </a>
        <div class="flex gap-1.5">
          <div class="w-8 h-1 rounded-full bg-gold-400"></div>
          <div class="w-8 h-1 rounded-full bg-gold-400"></div>
          <div class="w-8 h-1 rounded-full bg-gold-400"></div>
          <div class="w-8 h-1 rounded-full bg-gold-400"></div>
        </div>
        <div class="w-10"></div>
      </div>

      <!-- Content -->
      <div class="px-5 pt-8 flex-1 flex flex-col items-center">
        <!-- Success icon -->
        <div class="w-20 h-20 rounded-full bg-gradient-to-br from-gold-300 to-gold-500 flex items-center justify-center mb-6 shadow-lg">
          <i data-lucide="check" class="w-10 h-10 text-white"></i>
        </div>

        <h1 class="text-2xl font-bold text-text-primary mb-2 text-center">You're All Set!</h1>
        <p class="text-sm text-text-secondary text-center mb-8">Here's your personalised setup</p>

        <!-- Summary card -->
        <div class="w-full bg-gold-50 border border-gold-200 rounded-2xl p-5 space-y-4">
          <!-- Goal -->
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-white flex items-center justify-center flex-shrink-0">
              <i data-lucide="target" class="w-4.5 h-4.5 text-gold-500"></i>
            </div>
            <div>
              <p class="text-[10px] font-semibold text-text-muted uppercase tracking-wider">Goal</p>
              <p class="text-sm font-bold text-text-primary">Body Recomposition</p>
            </div>
          </div>

          <!-- Devices -->
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-white flex items-center justify-center flex-shrink-0">
              <i data-lucide="watch" class="w-4.5 h-4.5 text-purple-500"></i>
            </div>
            <div>
              <p class="text-[10px] font-semibold text-text-muted uppercase tracking-wider">Devices</p>
              <p class="text-sm font-bold text-text-primary">Garmin, Oura Ring</p>
            </div>
          </div>

          <!-- Calories -->
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-white flex items-center justify-center flex-shrink-0">
              <i data-lucide="flame" class="w-4.5 h-4.5 text-danger"></i>
            </div>
            <div>
              <p class="text-[10px] font-semibold text-text-muted uppercase tracking-wider">Daily Calories</p>
              <p class="text-sm font-bold text-text-primary">2,200 kcal</p>
            </div>
          </div>

          <!-- Macros -->
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-white flex items-center justify-center flex-shrink-0">
              <i data-lucide="pie-chart" class="w-4.5 h-4.5 text-blue-500"></i>
            </div>
            <div>
              <p class="text-[10px] font-semibold text-text-muted uppercase tracking-wider">Macro Split</p>
              <p class="text-sm font-bold text-text-primary">180P / 200C / 73F</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom CTA -->
      <div class="px-5 py-6">
        <a href="dashboard.html" class="btn-press block w-full py-4 bg-gold-400 hover:bg-gold-500 text-white font-bold text-base rounded-xl transition-colors shadow-sm text-center">
          Go to Dashboard
        </a>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
